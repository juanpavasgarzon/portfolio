<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="180" fill="#7C3AED" opacity="0.08"/>
  <circle cx="950"  cy="500" r="120" fill="#4F46E5" opacity="0.06"/>
  <circle cx="200"  cy="480" r="100" fill="#7C3AED" opacity="0.05"/>

  <!-- Avatar circle placeholder -->
  <circle cx="600" cy="220" r="72" fill="#7C3AED" opacity="0.15"/>
  <circle cx="600" cy="220" r="72" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.4"/>
  <text x="600" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#7C3AED" text-anchor="middle" opacity="0.9">Jp</text>

  <!-- Name -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Juan Fernando Pavas Garzón</text>

  <!-- Job title -->
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#a78bfa" text-anchor="middle" letter-spacing="2">FULL-STACK DEVELOPER</text>
</svg>
